    <!-- كود JavaScript لتشغيل حركة التحميل وإخفائها -->
    <script>
        // دالة تشغل الحركة ثم تخفي شاشة التحميل بالكامل
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            
            // المرحلة 1: تشغيل حركة التجميع (بعد 50ms)
            // تستمر حركة التجميع لمدة ثانيتين (2000ms)
            setTimeout(() => {
                preloader.classList.add('scrambled');
            }, 50);

            // المرحلة 2: تشغيل حركة التفرق (بعد 2 ثانية تجميع + 1 ثانية انتظار = 3050ms)
            // نستخدم 3050 ميلي ثانية لبدء التفكك، مما يمنح ثانية كاملة لقراءة الاسم.
            setTimeout(() => {
                preloader.classList.remove('scrambled'); // إزالة كلاس التجميع
                preloader.classList.add('disperse'); // إضافة كلاس التفكك السريع (0.5 ثانية)
            }, 3050); // 3.05 ثانية

            // المرحلة 3: إخفاء شاشة التحميل بالكامل (3050ms + 500ms تفكك + 50ms إضافية)
            // نستخدم 3600 ميلي ثانية لإخفاء الشاشة نهائيًا.
            setTimeout(() => {
                preloader.classList.add('hidden');
            }, 3600); // 3.6 ثانية هو إجمالي وقت الحركة
        });
    </script>
